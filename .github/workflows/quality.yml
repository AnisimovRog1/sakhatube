name: Quality gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# A newer commit supersedes an older validation run for the same branch/PR.
concurrency:
  group: quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  server-and-release-files:
    name: Server API and release files
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:api
      - run: node --check server/app.js
      - run: node --check server/postgres-store.js
      - run: node --check legal/legal.js
      - run: npm --prefix worker ci
      - run: npm --prefix worker test
      - run: node -e "JSON.parse(require('fs').readFileSync('release/store-submission-checklist.json', 'utf8')); console.log('release checklist valid')"

  android-debug:
    name: Android debug build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      # `compileSdk = 36` is intentional. Hosted runners do not guarantee that
      # this newest platform is pre-installed, so install the exact SDK pieces
      # before compiling rather than silently building against an older API.
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      # This is a debug-only integrity check. Release builds intentionally need
      # the owner-provided Firebase config and signing key, which CI never reads.
      - run: ./gradlew --no-daemon :app:assembleDebug
        working-directory: apps/android

  ios-debug:
    name: iOS debug build
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      # Debug does not require the untracked Firebase plist or a signing identity.
      - run: >-
          xcodebuild
          -project SakhaTube.xcodeproj
          -scheme SakhaTube
          -configuration Debug
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          build
        working-directory: apps/ios
