name: SakhaTube
options:
  bundleIdPrefix: com.sakhatube
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
  configs:
    Debug:
      SAKHATUBE_API_BASE_URL: "http://127.0.0.1:3000"
      SAKHATUBE_SUBSCRIPTION_PRODUCT_IDS: ""
    Release:
      SAKHATUBE_API_BASE_URL: "https://sakhatube-production.up.railway.app"
      SAKHATUBE_SUBSCRIPTION_PRODUCT_IDS: ""
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "12.14.0"
targets:
  SakhaTube:
    type: application
    platform: iOS
    sources:
      - path: SakhaTube
    preBuildScripts:
      - name: Verify and embed Firebase configuration
        basedOnDependencyAnalysis: false
        script: |
          FIREBASE_CONFIG="${SRCROOT}/SakhaTube/GoogleService-Info.plist"
          if [ "${CONFIGURATION}" = "Release" ] && [ ! -f "${FIREBASE_CONFIG}" ]; then
            echo "error: Missing SakhaTube/GoogleService-Info.plist. Download the iOS config for com.sakhatube.app from Firebase before archiving a release."
            exit 1
          fi
          if [ -f "${FIREBASE_CONFIG}" ]; then
            cp "${FIREBASE_CONFIG}" "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/GoogleService-Info.plist"
          fi
    dependencies:
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseAuth
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sakhatube.app
        PRODUCT_NAME: SakhaTube
        INFOPLIST_FILE: SakhaTube/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
    scheme:
      testTargets: []
      gatherCoverageData: false
