name: SakhaTube
options:
  bundleIdPrefix: com.sakhatube
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
  configs:
    Debug:
      SAKHATUBE_API_BASE_URL: "http://127.0.0.1:3000"
    Release:
      SAKHATUBE_API_BASE_URL: "https://sakhatube-production.up.railway.app"
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "12.14.0"
targets:
  SakhaTube:
    type: application
    platform: iOS
    sources:
      - path: SakhaTube
    dependencies:
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseAuth
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sakhatube.app
        PRODUCT_NAME: SakhaTube
        INFOPLIST_FILE: SakhaTube/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
    scheme:
      testTargets: []
      gatherCoverageData: false
